<!doctype html>
<html lang="nl">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Brandweer Herentals — Defectmeldingen status</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#c71f1f">

<link rel="stylesheet" href="style.css">


<style>

/* ==========================
   STATUS PAGINA
========================== */

.page-title{
  text-align:center;
  margin:15px 0 5px;
  font-size:1.4rem;
}


.teller{
  text-align:center;
  margin-bottom:15px;
  font-weight:bold;
}


.meldingen-container{

  display:flex;
  flex-direction:column;
  gap:15px;

}


.melding{

  background:#fff;
  padding:16px;
  border-radius:14px;
  box-shadow:0 3px 8px rgba(0,0,0,.1);

}


.row{

  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:10px;

}


.item{

 flex:1;
 min-width:130px;

}


.label{

 font-size:.8rem;
 color:#777;

}


.value{

 font-weight:600;
 word-break:break-word;

}


.status{

 display:inline-block;
 padding:6px 14px;
 border-radius:20px;
 font-weight:bold;
 font-size:.85rem;

}


.status.Gemeld{

 background:#e3ecff;
 color:#1c3faa;

}


.status.Bezig{

 background:#fff3cd;
 color:#856404;

}


.status.Afgewerkt{

 background:#d4edda;
 color:#155724;

}


.status.Onbekend{

 background:#eee;

}


.loader{

 text-align:center;
 color:#777;

}



</style>

</head>



<body>


<div class="container">



<!-- HEADER -->

<header id="appHeader">

<div class="header-left">

<img src="logo.png"
     alt="Brandweer Herentals"
     class="header-logo">

</div>


<div class="header-right">

<div id="greeting"
     class="header-greeting">
</div>


<div id="datetime"
     class="header-datetime">
</div>


<div id="ploegOfWeek"
     class="header-ploeg">
</div>


</div>

</header>





<main class="content">


<a href="defectmelding.html"
   class="backlink">

<span class="arrow">←</span>
Terug naar defectmelding

</a>



<h2 class="page-title">
📊 Defectmeldingen status
</h2>


<div id="teller"
     class="teller">

Bezig met laden...

</div>



<div id="meldingenContainer"
     class="meldingen-container">

<p class="loader">
Meldingen worden geladen...
</p>


</div>



</main>





<footer>

<div>
Brandweer Herentals
</div>


<div>
Laatste update:
<span id="today"></span>
</div>


</footer>



</div>






<script>

/* ==========================
   DATUM FOOTER
========================== */


document.getElementById("today").textContent =
new Date().toLocaleDateString("nl-BE",{

weekday:"long",
year:"numeric",
month:"long",
day:"numeric"

});




const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQPU8cIbYtxm6jjiDUPJxufcOkCbHrKR1RJGYcjIVzfPxXvUMm-jiRpq0XMcFbiyg/pub?output=csv";



const container =
document.getElementById("meldingenContainer");


const teller =
document.getElementById("teller");



const REFRESH_INTERVAL = 30000;





function parseCSV(text){


const rows=[];

let row=[];
let value="";
let quotes=false;



for(let i=0;i<text.length;i++){

const c=text[i];
const next=text[i+1];


if(c=='"' && quotes && next=='"'){

value+='"';
i++;

}

else if(c=='"'){

quotes=!quotes;

}

else if((c==',' || c==';') && !quotes){

row.push(value);
value="";

}

else if((c=="\n" || c=="\r") && !quotes){

if(value || row.length){

row.push(value);
rows.push(row);

}

row=[];
value="";

}

else{

value+=c;

}

}


return rows;

}





function parseDate(str){

if(!str)
return new Date(0);


const p=str.split("/");


if(p.length===3){

return new Date(
parseInt(p[2]),
parseInt(p[1])-1,
parseInt(p[0])
);

}


const d=new Date(str);

return isNaN(d)
? new Date(0)
: d;

}




function formatDate(d){

return d.toLocaleDateString("nl-BE");

}







function renderMeldingen(data){


data.sort((a,b)=>b.datumObj-a.datumObj);


container.innerHTML="";


teller.textContent =
`Totaal: ${data.length} meldingen`;



if(data.length===0){

container.innerHTML=
"<p class='loader'>Geen meldingen gevonden</p>";

return;

}



data.forEach(m=>{


const div=document.createElement("div");

div.className="melding";


div.innerHTML=`

<div class="row">

<div class="item">

<div class="label">
👤 Naam
</div>

<div class="value">
${m.naam || "/"}
</div>

</div>



<div class="item">

<div class="label">
📅 Datum
</div>

<div class="value">
${formatDate(m.datumObj)}
</div>

</div>


</div>



<div class="row">


<div class="item">

<div class="label">
🔧 Defect
</div>

<div class="value">
${m.omschrijving || "/"}
</div>

</div>



<div class="item">

<div class="label">
📌 Status
</div>


<span class="status ${m.statusClass}">
${m.status}
</span>


</div>


</div>



<div class="row">

<div class="item">

<div class="label">
📍 Locatie
</div>


<div class="value">
${m.locatie || "/"}
</div>


</div>


</div>

`;


container.appendChild(div);


});


}






function loadMeldingen(){


fetch(
SHEET_URL+"&t="+Date.now(),
{
cache:"no-store"
}

)

.then(r=>r.text())


.then(csv=>{


const rows=parseCSV(csv);


const headers=rows.shift();


const index=n=>
headers.findIndex(
h=>h.trim().toLowerCase()==n
);



const data=[];



rows.forEach(r=>{


const naam=r[index("naam")] || "";
const datum=r[index("datum")] || "";
const omschrijving=r[index("defect omschrijving")] || "";
const locatie=r[index("locatie")] || "";
const raw=r[index("status")] || "";



if(!naam && !omschrijving)
return;



let status="Onbekend";
let cls="Onbekend";


const s=raw.toLowerCase();



if(s.includes("gemeld")){

status="Gemeld";
cls="Gemeld";

}

else if(
s.includes("bezig") ||
s.includes("behandeling")
){

status="In behandeling";
cls="Bezig";

}

else if(
s.includes("afgewerkt") ||
s.includes("opgelost")
){

status="Afgewerkt";
cls="Afgewerkt";

}




data.push({

naam,
omschrijving,
locatie,

datumObj:
parseDate(datum),

status,
statusClass:cls

});


});



renderMeldingen(data);



})

.catch(err=>{

console.error(err);


teller.textContent=
"Fout bij laden";


container.innerHTML=
"<p class='loader'>❌ Kan meldingen niet laden</p>";

});


}




loadMeldingen();

setInterval(
loadMeldingen,
REFRESH_INTERVAL
);



</script>




<script src="header.js"></script>


</body>

</html>
