<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brandweer Herentals — Afgewerkte Herstellingen</title>

<link rel="stylesheet" href="/brandweerherentals/style.css">

<style>
.container { max-width: 900px; margin: 0 auto; padding-bottom:40px; }

header#appHeader {
  display:flex; justify-content:space-between; align-items:center;
  background:#c71f1f; color:#fff; padding:12px 16px;
  border-radius:18px 18px 0 0;
}

.page-content { padding:20px; }

.backlink {
  display:inline-block; color:#fff; background:#c71f1f;
  padding:6px 12px; border-radius:8px; text-decoration:none; font-weight:600;
  margin-bottom:16px;
}

.card {
  background:#f7f7f7; border-radius:14px;
  padding:16px; margin-bottom:16px;
  box-shadow:0 3px 6px rgba(0,0,0,.12);
}

.card h3 { color:#c71f1f; margin-bottom:10px; }
.card p { margin:4px 0; }
.status-badge {
  display:inline-block;
  padding:2px 8px;
  border-radius:6px;
  background:#28a745;
  color:#fff;
  font-size:0.8rem;
  font-weight:600;
}
</style>
</head>

<body>
<div class="container">

<header id="appHeader">
  <div class="header-left">
    <img src="/brandweerherentals/icons/logo.png" height="60">
  </div>
  <div class="header-right">
    <div id="greeting"></div>
    <div id="datetime"></div>
    <div id="ploegOfWeek"></div>
  </div>
</header>

<div class="page-content">
<a href="/brandweerherentals/" class="backlink">← Terug naar app</a>
<div id="afgewerktContainer"></div>
</div>
</div>

<script type="module">
import { getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firestore initialisatie
const db = window.db;

const container = document.getElementById('afgewerktContainer');

async function loadAfgewerkt() {
  container.innerHTML = "";

  const snapshot = await getDocs(collection(db, "herstellingen"));

  let count = 0;

  snapshot.forEach(doc => {
    const data = doc.data();

    // Filter op status "afgewerkt"
    if (data.status !== "afgewerkt") return;

    count++;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${data.naam}</h3>
      <p><strong>Type:</strong> ${data.type}</p>
      <p><strong>Datum melding:</strong> ${data.datum}</p>
      <p><strong>Probleem:</strong> ${data.probleem}</p>
      <p><span class="status-badge">${data.status}</span></p>
    `;

    container.appendChild(card);
  });

  if(count === 0){
    container.innerHTML = "<p>Er zijn momenteel geen afgewerkte meldingen.</p>";
  }
}

loadAfgewerkt();
</script>
</body>
</html>
