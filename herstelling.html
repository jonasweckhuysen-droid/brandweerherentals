<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Herstellingen pager / zender</title>

<link rel="stylesheet" href="/brandweerherentals/style.css">
<script src="/brandweerherentals/header.js" defer></script>

<style>
.container {
  max-width: 900px;
  margin: auto;
  padding: 0 12px;
}

.page-content {
  padding: 16px 0;
}

.card {
  background: #f7f7f7;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, .15);
  word-wrap: break-word;
}

.card h3 {
  margin-top: 0;
  color: #c71f1f;
  font-size: 1.1rem;
}

.label {
  font-weight: 600;
}

.status-select {
  margin-top: 8px;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  width: 100%;
}

.backlink {
  display: inline-block;
  background: #333;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  margin-bottom: 16px;
}

header#appHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: #c71f1f;
  border-radius: 18px 18px 0 0;
  color: #fff;
}

header#appHeader img {
  height: 60px;
}

header#appHeader .header-right div {
  margin: 2px 0;
}

@media(max-width:600px){
  .card {
    padding: 14px;
  }
  .card h3 {
    font-size: 1rem;
  }
  .backlink {
    padding: 6px 12px;
    font-size: 0.9rem;
  }
}
</style>
</head>

<body>

<div class="container">

<header id="appHeader">
  <div class="header-left">
    <img src="/brandweerherentals/icons/logo.png" class="header-logo">
  </div>
  <div class="header-right">
    <div id="greeting"></div>
    <div id="datetime"></div>
    <div id="ploegOfWeek"></div>
  </div>
</header>

<div class="page-content">

<h2>Herstellingen pager / zender</h2>
<a href="/brandweerherentals/afgewerkt.html" class="backlink">→ Afgewerkte meldingen</a>

<div id="lijst"></div>

</div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxKA6NPe6rkvZBTOHzlyc-KeMjE-gu_R9H4EcMwuu70pBK93RnthSqiIBeerDz1IuI/exec";
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqQMZ94AbWY9wyDpMoLN-lKUMCWKJjlZ3UwoPw3XtC8oAcMQI7Sd4ouzKL7_0-60iflppKdpPR0h3k/pub?output=csv";

function parseCSV(data) {
  const lines = data.trim().split("\n");
  return lines.map(line => {
    const match = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
    return match ? match.map(cell => cell.replace(/^"|"$/g, "")) : [];
  });
}

fetch(sheetURL)
.then(res => res.text())
.then(data => {
  const rows = parseCSV(data);
  const headers = rows.shift();
  const lijst = document.getElementById("lijst");

  const idxMelder = headers.findIndex(h => h.toLowerCase().includes("naam"));
  const idxDatum = headers.findIndex(h => h.toLowerCase().includes("datum"));
  const idxProbleem = headers.findIndex(h => h.toLowerCase().includes("omschrijving"));
  const idxStatus = headers.findIndex(h => h.toLowerCase().includes("status"));

  rows.reverse().forEach(row => {
    if(row[idxStatus]?.toLowerCase() === "afgewerkt") return;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${row[idxProbleem] || "Herstelling"}</h3>
      <p><span class="label">Melder:</span> ${row[idxMelder] || "-"}</p>
      <p><span class="label">Datum:</span> ${row[idxDatum] || "-"}</p>
      <p><span class="label">Status:</span>
        <select class="status-select">
          <option value="Gemeld" ${row[idxStatus]==="Gemeld"?"selected":""}>Gemeld</option>
          <option value="In behandeling" ${row[idxStatus]==="In behandeling"?"selected":""}>In behandeling</option>
          <option value="Afgewerkt">Afgewerkt</option>
        </select>
      </p>
    `;
    lijst.appendChild(card);

    const select = card.querySelector(".status-select");
    select.addEventListener("change", e => {
      const nieuweStatus = e.target.value;

      fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({
          melder: row[idxMelder],
          datum: row[idxDatum],
          probleem: row[idxProbleem],
          status: nieuweStatus
        }),
        headers: { "Content-Type": "application/json" }
      })
      .then(resp => {
        if(nieuweStatus === "Afgewerkt") {
          card.remove();
        }
      })
      .catch(err => console.error("Fout bij status update:", err));
    });
  });
});
</script>

</body>
</html>
