/* ============================
 HELPERS
============================ */


function safeKey(text){

return text
.replace(/[.#$/[\]]/g,"_")
.replace(/ /g,"_");

}




/* ============================
 RENDER
============================ */


function renderAgenda(){


const container=
document.getElementById("duikAgendaContainer");


container.innerHTML="";



duikAgenda.forEach(oefening=>{


const dateKey=
safeKey(
`${oefening.datum}_${oefening.uur}`
);



let card=document.createElement("div");

card.className="duik-card";



card.innerHTML=`

<h3>
📅 ${oefening.datum} - ${oefening.uur}
</h3>


<div class="duik-info">

📍 <b>Locatie:</b> ${oefening.plaats}<br>

📝 <b>Oefening:</b> ${oefening.oef}

</div>


<div id="duikers-${dateKey}"></div>

`;



container.appendChild(card);



const lijst=
card.querySelector(`#duikers-${dateKey}`);



duikers.forEach(d=>{


const naamKey=
safeKey(d.naam);



const rij=
document.createElement("div");


rij.className="duiker-rij";



const knop=
document.createElement("button");


knop.className=
"status-btn status-onbekend";


knop.innerText="…";



const ref=
db.ref(
`duikAanwezig/${dateKey}/${naamKey}`
);



ref.on("value",snap=>{


const waarde=snap.val();



if(waarde===true){

knop.className=
"status-btn status-aanwezig";

knop.innerText="Aanwezig";


}

else if(waarde===false){

knop.className=
"status-btn status-afwezig";

knop.innerText="Afwezig";

}


else{


knop.className=
"status-btn status-onbekend";

knop.innerText="…";


}


});




knop.onclick=async()=>{


const snap=
await ref.get();


ref.set(
snap.val()===true
? false
: true
);


};



rij.innerHTML=`

<div>

<span class="duiker-naam">
${d.naam}
</span>

<br>

<span class="duiker-functie">
${d.functie}
</span>

</div>

`;



rij.appendChild(knop);


lijst.appendChild(rij);



});



});

}



renderAgenda();
