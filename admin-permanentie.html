<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Permanentie beheer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#c71f1f;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

input, select{
  padding:10px;
  width:100%;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.card{
  background:#fff;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>🚒 Permanentie</div>
  <button onclick="back()">⬅ Back</button>
</header>

<div class="container">

<label>Datum</label>
<input type="date" id="date" onchange="load()">

<label>Persoon toevoegen</label>
<select id="person"></select>

<button onclick="add()">Toevoegen</button>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  set,
  remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);

let users = {};
let perm = {};

const dateEl = document.getElementById("date");
const personEl = document.getElementById("person");
const listEl = document.getElementById("list");

/* USERS LOAD */
onValue(ref(db,"users"), snap=>{
  users = snap.val() || {};
  fillUsers();
});

/* PERMANENTIE LOAD */
onValue(ref(db,"permanentie"), snap=>{
  perm = snap.val() || {};
  load();
});

/* FILL USERS DROPDOWN */
function fillUsers(){

  personEl.innerHTML = "";

  Object.keys(users)
    .sort((a,b)=>users[a].displayName.localeCompare(users[b].displayName,"nl"))
    .forEach(id=>{
      personEl.innerHTML += `
        <option value="${id}">
          ${users[id].displayName}
        </option>
      `;
    });
}

/* LOAD DAY */
window.load = function(){

  const date = dateEl.value;
  if(!date) return;

  listEl.innerHTML = "";

  const day = perm[date] || {};

  Object.keys(day).forEach(id=>{

    listEl.innerHTML += `
      <div class="card">
        <div>${users[id]?.displayName || id}</div>
        <button onclick="removePerson('${date}','${id}')">🗑</button>
      </div>
    `;
  });
};

/* ADD */
window.add = async function(){

  const date = dateEl.value;
  const person = personEl.value;

  if(!date || !person) return;

  await set(ref(db,"permanentie/"+date+"/"+person), true);

  load();
};

/* REMOVE */
window.removePerson = async function(date,id){

  await remove(ref(db,"permanentie/"+date+"/"+id));

  load();
};

/* BACK */
window.back = function(){
  window.location.href = "admin.html";
};

</script>

</body>
</html>
