<!doctype html>
<html lang="nl">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Permanentie beheer</title>


<link rel="manifest" href="/brandweerherentals/manifest.json">

<meta name="theme-color" content="#c71f1f">


<link rel="stylesheet" href="style.css">



<style>


/* PAGINA SPECIFIEK */


.form-card label{

display:block;
font-weight:bold;
margin-top:12px;

}



.form-card input,
.form-card select{

width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;

}



.primary-btn{

margin-top:15px;
background:#c71f1f;
color:white;
border:none;
padding:14px;
width:100%;
border-radius:12px;
font-weight:bold;
cursor:pointer;

}


.primary-btn:hover{

background:#8f1515;

}



.perm-card{

display:flex;
justify-content:space-between;
align-items:center;

}



.delete-btn{

background:#c71f1f;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;

}



.delete-btn:hover{

background:#8f1515;

}



</style>


</head>



<body>



<div class="container">



<!-- VASTE HEADER -->

<header id="appHeader">


<div class="header-left">

<img src="logo.png"
     class="header-logo"
     alt="Brandweer Herentals">

</div>



<div class="header-right">

<div id="greeting" class="header-name"></div>

<div id="datetime"></div>

<div id="ploegOfWeek"></div>

</div>



</header>





<main class="content">



<a href="admin.html" class="backlink">

<span class="arrow">←</span>

Terug

</a>




<h2>🕒 Permanentie beheer</h2>






<!-- FORMULIER -->


<div class="card form-card">


<h3>Persoon toevoegen</h3>



<label>

Datum

</label>


<input type="date"
       id="date"
       onchange="load()">






<label>

Persoon

</label>


<select id="person">

</select>






<button class="primary-btn"
        onclick="add()">

Toevoegen

</button>



</div>







<h3>Geselecteerde permanentie</h3>



<div id="list"></div>




</main>







<footer>


<div>

Versie 1.2

</div>



<button onclick="logout()">

Uitloggen

</button>



</footer>




</div>









<script type="module">



import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";



import {

getDatabase,

ref,

onValue,

set,

remove

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";





const app = initializeApp({

databaseURL:
"https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"

});



const db = getDatabase(app);





let users = {};

let perm = {};





const dateEl =
document.getElementById("date");


const personEl =
document.getElementById("person");


const listEl =
document.getElementById("list");







/*
GEBRUIKERS LADEN
*/


onValue(ref(db,"users"),snap=>{


users = snap.val() || {};

fillUsers();


});








/*
PERMANENTIE LADEN
*/


onValue(ref(db,"permanentie"),snap=>{


perm = snap.val() || {};

load();


});








/*
DROPDOWN VULLEN
*/


function fillUsers(){



personEl.innerHTML="";



Object.keys(users)

.sort((a,b)=>

(users[a].displayName || a)

.localeCompare(

users[b].displayName || b,

"nl"

)

)



.forEach(id=>{


personEl.innerHTML += `

<option value="${id}">

${users[id].displayName || id}

</option>

`;



});


}









/*
DAG LADEN
*/


window.load=function(){



const date =
dateEl.value;



if(!date)
return;




listEl.innerHTML="";



const day =
perm[date] || {};




Object.keys(day)

.forEach(id=>{


const div =
document.createElement("div");



div.className =
"card perm-card";



div.innerHTML=`

<div>

👤 ${users[id]?.displayName || id}

</div>


<button class="delete-btn"
onclick="removePerson('${date}','${id}')">

🗑

</button>

`;



listEl.appendChild(div);



});



};









/*
TOEVOEGEN
*/


window.add=async function(){



const date =
dateEl.value;



const person =
personEl.value;



if(!date || !person){

alert("Kies een datum en persoon");

return;

}



await set(

ref(
db,
"permanentie/"+date+"/"+person
),

true

);



load();


};









/*
VERWIJDEREN
*/


window.removePerson=

async function(date,id){



if(!confirm("Persoon verwijderen uit permanentie?"))

return;



await remove(

ref(
db,
"permanentie/"+date+"/"+id
)

);



load();


};









function logout(){

localStorage.removeItem("userName");

location.reload();


}



</script>




<script src="header.js"></script>




</body>

</html>
