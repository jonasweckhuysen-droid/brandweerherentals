<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda - Brandweer Herentals</title>

<link rel="stylesheet" href="style.css">


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>


</head>


<body>


<div class="container">


<header id="appHeader">

<div class="header-left">
<img src="icons/logo.png" class="header-logo" alt="Brandweer Herentals">
</div>


<div class="header-right">

<div id="greeting" class="header-name"></div>

<div id="datetime"></div>

<div id="ploegOfWeek"></div>

</div>


</header>



<main class="content">


<a href="index.html" class="backlink">
<span class="arrow">←</span> Terug
</a>


<h2>📅 Agenda</h2>


<div id="agendaCount"></div>


<div id="agenda"></div>


</main>


</div>




<script>


/* ================= FIREBASE ================= */


if(!firebase.apps.length){

firebase.initializeApp({

databaseURL:
"https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"

});

}


const db = firebase.database();





/* ================= GOOGLE ================= */


const GOOGLE_API_KEY =
"AIzaSyDLOdqVeA-SSjSN-0RtzDP4R451nqov0lE";


const IMPORT_CALENDAR_ID =
"df2fa36fb8ea4044f8276cf20d9922d6c350e7f7604bb5ad4a53521324f78727@group.calendar.google.com";




let agendaItems=[];





/* ================= DATUM FORMAT ================= */


function formatDate(date){


return new Date(date).toLocaleDateString(
"nl-BE",
{
weekday:"long",
day:"numeric",
month:"long",
year:"numeric"
}
);


}



function formatTime(date){


return new Date(date).toLocaleTimeString(
"nl-BE",
{
hour:"2-digit",
minute:"2-digit"
}
);


}







/* ================= GOOGLE EVENTS ================= */


async function loadGoogleCalendar(){


try{


const now=new Date();


const response =
await fetch(

`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(IMPORT_CALENDAR_ID)}/events?key=${GOOGLE_API_KEY}&timeMin=${now.toISOString()}&singleEvents=true&orderBy=startTime`

);



const data =
await response.json();



(data.items || []).forEach(e=>{


const start =
e.start.dateTime || e.start.date;


const end =
e.end.dateTime || e.end.date;



agendaItems.push({

type:"google",

date:start,

end:end,

title:e.summary || "Activiteit",

description:e.description || ""

});


});



}
catch(err){

console.error(
"Google agenda fout:",
err
);

}


}







/* ================= FIREBASE RESERVATIES ================= */


function loadVehicleReservations(){


return new Promise(resolve=>{


db.ref("reservations").on(
"value",
snapshot=>{


const data =
snapshot.val() || {};



Object.keys(data)
.map(id=>({

id,
...data[id]

}))


.filter(r=>r.status==="Goedgekeurd")


.filter(r=>new Date(r.to)>=new Date())


.forEach(r=>{


agendaItems.push({

type:"vehicle",

date:r.from,

end:r.to,

title:r.vehicle,

user:r.user,

purpose:r.purpose,

persons:r.persons

});


});



resolve();


}

);



});


}







/* ================= RENDER ================= */


function renderAgenda(){


const wrap =
document.getElementById("agenda");


wrap.innerHTML="";



agendaItems.sort(
(a,b)=>
new Date(a.date)-new Date(b.date)
);



document.getElementById(
"agendaCount"
).innerHTML =

`📅 ${agendaItems.length} komende activiteiten`;





if(!agendaItems.length){


wrap.innerHTML =
`
<div class="card">

Geen toekomstige activiteiten gevonden.

</div>
`;

return;


}






agendaItems.forEach(item=>{


const card =
document.createElement("div");


card.className="card";



if(item.type==="google"){

card.style.borderLeft=
"5px solid #3498db";

}


if(item.type==="vehicle"){

card.style.borderLeft=
"5px solid #c71f1f";

}





card.innerHTML=`

<div class="card-header">

${item.type==="google" ? "📅" : "🚒"}

${formatDate(item.date)}

</div>



<div class="card-body">


<h3>

${item.title}

</h3>



<div>

🕒 
${formatTime(item.date)}
-
${formatTime(item.end)}

</div>



${
item.user ?

`<div>
👤 ${item.user}
</div>`
:""
}



${
item.purpose ?

`<div>
🎯 ${item.purpose}
</div>`
:""
}



${
item.persons ?

`<div>
👥 ${item.persons} personen
</div>`
:""
}


</div>

`;



wrap.appendChild(card);


});


}







/* ================= START ================= */


async function initAgenda(){


await loadGoogleCalendar();


await loadVehicleReservations();


renderAgenda();


}



initAgenda();



</script>



<script src="header.js"></script>


</body>

</html>
