<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voertuigenreservatie</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
body { font-family: sans-serif; margin:0; }
.container { max-width:600px; margin:auto; padding:10px; }
.card { padding:10px; background:#f5f5f5; margin-bottom:10px; border-radius:8px; }
input, button { width:100%; padding:10px; margin:6px 0; }
button { background:#c71f1f; color:#fff; border:none; }
</style>
</head>

<body>

<div class="container">

<h2>🚒 Voertuigenreservatie</h2>

<div class="card">

<label>Voertuig</label>
<label><input type="radio" name="vehicle" value="Caddy S542" checked> Caddy S542</label>
<label><input type="radio" name="vehicle" value="Galaxy S541"> Galaxy S541</label>

<label>Van</label>
<input type="datetime-local" id="from">

<label>Tot</label>
<input type="datetime-local" id="to">

<label>Doel</label>
<input type="text" id="purpose">

<label>Aantal personen</label>
<input type="number" id="persons">

<button id="submitBtn">Aanvraag indienen</button>

</div>

<h3>Reservaties</h3>
<div id="reservations"></div>

</div>

<script>
/* SAFE INIT */
if (!firebase.apps.length) {
  firebase.initializeApp({
    databaseURL: "https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"
  });
}

const db = firebase.database();
  const firebaseConfig = {
  apiKey: "AIzaSyAUkFsXiJ7MOIDFfC0AUk9DiT_BPIHzfEE",
  authDomain: "post-herentals.firebaseapp.com",
  databaseURL: "https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "post-herentals",
  storageBucket: "post-herentals.firebasestorage.app",
  messagingSenderId: "762725561089",
  appId: "1:762725561089:web:38c46cc8cf44d624252100",
  measurementId: "G-C2FWECFEQX"
};

const currentUser = localStorage.getItem("userName") || "Onbekend";

/* SUBMIT */
document.getElementById("submitBtn").onclick = async () => {

  const vehicle = document.querySelector('input[name="vehicle"]:checked').value;
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;

  if (!from || !to) {
    alert("Vul tijden in");
    return;
  }

  if (new Date(from) >= new Date(to)) {
    alert("Einde moet na start zijn");
    return;
  }

  const r = {
    user: currentUser,
    vehicle,
    from,
    to,
    purpose: document.getElementById("purpose").value,
    persons: document.getElementById("persons").value,
    status: "In afwachting",
    timestamp: Date.now()
  };

  try {
    await db.ref("reservations").push(r);
    alert("Aanvraag verstuurd");

    document.getElementById("from").value = "";
    document.getElementById("to").value = "";
    document.getElementById("purpose").value = "";
    document.getElementById("persons").value = "";

catch (e) {
  console.error("Firebase fout:", e);
  alert("Firebase fout:\n" + e.message);
}
};

/* LIVE DATA */
db.ref("reservations").on("value", snap => {

  const data = snap.val() || {};
  const list = document.getElementById("reservations");

  list.innerHTML = "";

  Object.keys(data).forEach(id => {

    const r = data[id];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${r.vehicle}</b><br>
      ${r.from} → ${r.to}<br>
      ${r.user}<br>
      Status: ${r.status}
    `;

    list.appendChild(div);
  });
});
</script>

</body>
</html>
