<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voertuigenreservatie</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-messaging-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#c71f1f;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  max-width:700px;
  margin:auto;
  padding:12px;
}

.card{
  background:#fff;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

input, button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#c71f1f;
  color:#fff;
  border:none;
  font-weight:bold;
}

.vehicle-options label{
  display:block;
  margin:4px 0;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  margin-top:4px;
}

.wait{ background:#f1c40f; }
.ok{ background:#2ecc71; color:#fff; }
.no{ background:#e74c3c; color:#fff; }

.time{
  font-size:14px;
  margin:6px 0;
  color:#333;
}
</style>
</head>

<body>

<header>
  🚒 Voertuigenreservatie
</header>

<div class="container">

<!-- FORM -->
<div class="card">
  <h3>Nieuwe aanvraag</h3>

  <label>Voertuig</label>
  <div class="vehicle-options">
    <label><input type="radio" name="vehicle" value="Caddy S542" checked> Caddy S542</label>
    <label><input type="radio" name="vehicle" value="Galaxy S541"> Galaxy S541</label>
    <label><input type="radio" name="vehicle" value="Personeelsbus S545"> Personeelsbus S545</label>
    <label><input type="radio" name="vehicle" value="Camionette L543"> Camionette L543</label>
  </div>

  <label>Van</label>
  <input type="datetime-local" id="from">

  <label>Tot</label>
  <input type="datetime-local" id="to">

  <label>Doel</label>
  <input type="text" id="purpose">

  <label>Aantal personen</label>
  <input type="number" id="persons">

  <button id="submitBtn">Aanvraag indienen</button>
</div>

<h3>Reservaties</h3>
<div id="reservations"></div>

</div>

<script>
/* ---------------- FIREBASE INIT ---------------- */
firebase.initializeApp({
  apiKey: "AIzaSyAUkFsXiJ7MOIDFfC0AUk9DiT_BPIHzfEE",
  authDomain: "post-herentals.firebaseapp.com",
  databaseURL: "https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "post-herentals",
  storageBucket: "post-herentals.appspot.com",
  messagingSenderId: "762725561089",
  appId: "1:762725561089:web:38c46cc8cf44d624252100"
});

const db = firebase.database();
const messaging = firebase.messaging();

/* ---------------- USER ---------------- */
const currentUser = localStorage.getItem("userName") || "Onbekend";

/* ---------------- PUSH (voor later gebruik klaar) ---------------- */
async function enableNotifications() {
  try {
    const permission = await Notification.requestPermission();
    if(permission !== "granted") return;

    const token = await messaging.getToken({
      vapidKey: "JOUW_VAPID_KEY"
    });

    await db.ref("tokens/" + currentUser).set({
      token
    });

    console.log("Push token opgeslagen");
  } catch(err) {
    console.error("Push error:", err);
  }
}
enableNotifications();

/* ---------------- FORMAT ---------------- */
function formatDateTime(from, to){
  const f = new Date(from);
  const t = new Date(to);

  const optionsDate = {
    weekday:"short",
    day:"2-digit",
    month:"long",
    year:"numeric"
  };

  const optionsTime = {
    hour:"2-digit",
    minute:"2-digit"
  };

  return `
    📅 ${f.toLocaleDateString("nl-BE", optionsDate)}<br>
    🕒 ${f.toLocaleTimeString("nl-BE", optionsTime)}
    → ${t.toLocaleTimeString("nl-BE", optionsTime)}
  `;
}

/* ---------------- SUBMIT ---------------- */
document.getElementById("submitBtn").onclick = async () => {

  const vehicle = document.querySelector('input[name="vehicle"]:checked').value;
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;

  if(!from || !to){
    alert("Vul alle velden in");
    return;
  }

  if(new Date(from) >= new Date(to)){
    alert("Eindtijd moet na starttijd liggen");
    return;
  }

  try {
    await db.ref("reservations").push({
      user: currentUser,
      vehicle,
      from,
      to,
      purpose: document.getElementById("purpose").value,
      persons: document.getElementById("persons").value,
      status: "In afwachting",
      timestamp: Date.now()
    });

    alert("Aanvraag verstuurd");

    document.getElementById("from").value = "";
    document.getElementById("to").value = "";
    document.getElementById("purpose").value = "";
    document.getElementById("persons").value = "";

  } catch(e){
    console.error(e);
    alert("Firebase fout: " + e.message);
  }
};

/* ---------------- LIVE DATA ---------------- */
db.ref("reservations").on("value", snap => {

  const data = snap.val() || {};
  const list = document.getElementById("reservations");

  list.innerHTML = "";

  Object.keys(data)
    .map(id => ({ id, ...data[id] }))
    .sort((a,b) => new Date(a.from) - new Date(b.from))
    .forEach(r => {

      let badgeClass = "wait";
      if(r.status === "Goedgekeurd") badgeClass = "ok";
      if(r.status === "Afgekeurd") badgeClass = "no";

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>🚗 ${r.vehicle}</b><br>

        <div class="time">
          ${formatDateTime(r.from, r.to)}
        </div>

        👤 ${r.user}<br>
        🎯 ${r.purpose || "-"}<br>
        👥 ${r.persons || "-"} personen<br>

        <span class="badge ${badgeClass}">
          ${r.status}
        </span>
      `;

      list.appendChild(div);
    });
});
</script>

</body>
</html>
