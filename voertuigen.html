<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voertuigenreservatie</title>

<link rel="manifest" href="/brandweerherentals/manifest.json">
<meta name="theme-color" content="#c71f1f">

<link rel="stylesheet" href="style.css">


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-messaging-compat.js"></script>


<style>

/* Enkel voertuigen specifieke styling */

.vehicle-options label{
    display:block;
    margin:8px 0;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:8px;
    font-size:12px;
    font-weight:bold;
    margin-top:8px;
}

.wait{
    background:#f1c40f;
    color:#111;
}

.ok{
    background:#2ecc71;
    color:white;
}

.no{
    background:#e74c3c;
    color:white;
}


.time{
    margin:8px 0;
    line-height:1.5;
}


.vehicle-card{
    border-left:5px solid #c71f1f;
}


.form-group{
    margin-bottom:12px;
}


.form-group label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}


input[type="datetime-local"],
input[type="text"],
input[type="number"]{

    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;

}


.submit-btn{

    background:#c71f1f;
    color:white;
    border:none;
    padding:14px;
    border-radius:12px;
    font-weight:bold;
    width:100%;
    cursor:pointer;

}


.submit-btn:hover{
    background:#8f1515;
}


</style>

</head>



<body>


<div class="container">


<!-- VASTE HEADER -->
<header id="appHeader">

    <div class="header-left">
        <img src="logo.png" 
             alt="Brandweer Herentals"
             class="header-logo">
    </div>


    <div class="header-right">

        <div id="greeting" class="header-name"></div>

        <div id="datetime"></div>

        <div id="ploegOfWeek"></div>

    </div>


</header>



<main class="content">


<a href="index.html" class="backlink">
    <span class="arrow">←</span>
    Terug
</a>



<h2>🚒 Voertuigenreservatie</h2>



<!-- NIEUWE AANVRAAG -->

<div class="card">


<h3>Nieuwe aanvraag</h3>



<div class="form-group">

<label>Voertuig</label>


<div class="vehicle-options">

<label>
<input type="radio" 
       name="vehicle" 
       value="Caddy S542" 
       checked>

Caddy S542
</label>


<label>
<input type="radio" 
       name="vehicle" 
       value="Galaxy S541">

Galaxy S541
</label>


<label>
<input type="radio" 
       name="vehicle" 
       value="Personeelsbus S545">

Personeelsbus S545
</label>


<label>
<input type="radio" 
       name="vehicle" 
       value="Camionette L543">

Camionette L543
</label>


</div>

</div>




<div class="form-group">

<label>Van</label>

<input type="datetime-local" id="from">

</div>




<div class="form-group">

<label>Tot</label>

<input type="datetime-local" id="to">

</div>




<div class="form-group">

<label>Doel</label>

<input type="text" id="purpose">

</div>




<div class="form-group">

<label>Aantal personen</label>

<input type="number" id="persons">

</div>




<button class="submit-btn" id="submitBtn">
Aanvraag indienen
</button>


</div>





<h3>Reservaties</h3>


<div id="reservations"></div>



</main>





<footer>

<div>
Versie 1.2
</div>


<button onclick="logout()">
Uitloggen
</button>


</footer>



</div>





<script>


/* FIREBASE */

firebase.initializeApp({

apiKey: "AIzaSyAUkFsXiJ7MOIDFfC0AUk9DiT_BPIHzfEE",

authDomain: "post-herentals.firebaseapp.com",

databaseURL:
"https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app",

projectId:"post-herentals",

storageBucket:"post-herentals.appspot.com",

messagingSenderId:"762725561089",

appId:"1:762725561089:web:38c46cc8cf44d624252100"

});



const db = firebase.database();


const currentUser =
localStorage.getItem("userName") || "Onbekend";




/* DATUM FORMAT */

function formatDateTime(from,to){


const f=new Date(from);
const t=new Date(to);


return `

📅 ${f.toLocaleDateString("nl-BE",{

weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"

})}

<br>

🕒 ${f.toLocaleTimeString("nl-BE",{

hour:"2-digit",
minute:"2-digit"

})}

→

${t.toLocaleTimeString("nl-BE",{

hour:"2-digit",
minute:"2-digit"

})}

`;

}




/* RESERVATIE TOEVOEGEN */


document.getElementById("submitBtn").onclick =
async()=>{


const vehicle =
document.querySelector(
'input[name="vehicle"]:checked'
).value;


const from =
document.getElementById("from").value;


const to =
document.getElementById("to").value;



if(!from || !to){

alert("Vul alle tijden in");
return;

}



if(new Date(from)>=new Date(to)){

alert("Eindtijd moet na starttijd liggen");
return;

}



try{


await db.ref("reservations").push({

user:currentUser,

vehicle,

from,

to,

purpose:
document.getElementById("purpose").value,

persons:
document.getElementById("persons").value,

status:"In afwachting",

timestamp:Date.now()

});



alert("Aanvraag verstuurd");



document.getElementById("from").value="";
document.getElementById("to").value="";
document.getElementById("purpose").value="";
document.getElementById("persons").value="";


}

catch(e){

console.error(e);

alert(
"Firebase fout: "+
e.message
);

}


};







/* RESERVATIES LADEN */


db.ref("reservations").on("value",snap=>{


const data=snap.val() || {};

const list=
document.getElementById("reservations");


list.innerHTML="";



Object.keys(data)

.map(id=>({

id,
...data[id]

}))


.sort((a,b)=>
new Date(a.from)-new Date(b.from)
)


.forEach(r=>{


let badge="wait";


if(r.status==="Goedgekeurd")
badge="ok";


if(r.status==="Afgekeurd")
badge="no";



const div=document.createElement("div");


div.className="card vehicle-card";



div.innerHTML=`

<b>🚗 ${r.vehicle}</b>


<div class="time">

${formatDateTime(r.from,r.to)}

</div>


👤 ${r.user}<br>

🎯 ${r.purpose || "-"}<br>

👥 ${r.persons || "-"} personen


<br>


<span class="badge ${badge}">
${r.status}
</span>

`;



list.appendChild(div);


});


});





function logout(){

localStorage.removeItem("userName");

location.reload();

}


</script>



<!-- VASTE HEADER SCRIPT -->
<script src="header.js"></script>



</body>

</html>
