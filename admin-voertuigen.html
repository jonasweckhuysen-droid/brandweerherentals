<!doctype html>
<html lang="nl">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Voertuigen</title>

<link rel="stylesheet" href="style.css">


<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>


<style>


.container{

  max-width:900px;
  margin:auto;
  padding:15px;

}



.card{

  background:#fff;

  padding:15px;

  margin-bottom:12px;

  border-radius:12px;

  box-shadow:0 2px 6px rgba(0,0,0,.08);

}



.card-title{

  font-size:18px;

  font-weight:bold;

  margin-bottom:8px;

}



.info{

  line-height:1.6;

  color:#333;

}



.status{

  display:inline-block;

  padding:5px 10px;

  border-radius:8px;

  font-size:13px;

  margin-top:8px;

}



.wait{

  background:#f1c40f;

}



.ok{

  background:#2ecc71;

  color:white;

}



.no{

  background:#e74c3c;

  color:white;

}



.actions{

  margin-top:12px;

  display:flex;

  gap:8px;

  flex-wrap:wrap;

}



button{

  border:none;

  padding:10px 14px;

  border-radius:8px;

  cursor:pointer;

  font-weight:bold;

}



.approve{

  background:#2ecc71;

  color:white;

}



.reject{

  background:#555;

  color:white;

}



.delete{

  background:#c71f1f;

  color:white;

}



</style>


</head>


<body>


<header id="appHeader">

  <div class="header-left">

    <img src="logo.png" class="header-logo" alt="Brandweer Herentals">

  </div>


  <div class="header-right">

    <div id="greeting"></div>

    <div id="datetime"></div>

    <div id="ploegOfWeek"></div>

  </div>


</header>




<main class="content">


<a href="index.html" class="backlink">

← Terug

</a>



<h2>🚒 Beheer voertuigenreservaties</h2>




<div class="container" id="list">


</div>



</main>





<script>


/* FIREBASE */


if(!firebase.apps.length){

firebase.initializeApp({

databaseURL:
"https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"

});

}


const db=firebase.database();





/* LOAD RESERVATIES */


db.ref("reservations").on("value",snap=>{


const data=snap.val() || {};

const list=document.getElementById("list");


list.innerHTML="";



const reservations=Object.keys(data)

.map(id=>({

id,

...data[id]

}))


.sort((a,b)=>{

return new Date(a.from)-new Date(b.from);

});





reservations.forEach(r=>{



const div=document.createElement("div");

div.className="card";



let statusClass="wait";


if(r.status==="Goedgekeurd"){

statusClass="ok";

}


if(r.status==="Afgekeurd"){

statusClass="no";

}





div.innerHTML=`

<div class="card-title">

🚒 ${r.vehicle}

</div>


<div class="info">


📅 ${formatDate(r.from)}<br>

🕒 ${formatTime(r.from)} → ${formatTime(r.to)}<br>


👤 ${r.user || "-"}<br>


🎯 ${r.purpose || "-"}<br>


👥 ${r.persons || "-"} personen


</div>



<div class="status ${statusClass}">

${r.status}

</div>




<div class="actions">


${r.status==="In afwachting" ? `


<button class="approve"

onclick="updateStatus('${r.id}','Goedgekeurd')">

✅ Goedkeuren

</button>



<button class="reject"

onclick="updateStatus('${r.id}','Afgekeurd')">

❌ Afkeuren

</button>


`:""}



<button class="delete"

onclick="removeItem('${r.id}')">

🗑 Verwijderen

</button>


</div>

`;



list.appendChild(div);



});



});







function formatDate(date){


return new Date(date)

.toLocaleDateString("nl-BE",{

weekday:"long",

day:"2-digit",

month:"long",

year:"numeric"

});


}



function formatTime(date){


return new Date(date)

.toLocaleTimeString("nl-BE",{

hour:"2-digit",

minute:"2-digit"

});


}





/* UPDATE STATUS */


window.updateStatus=function(id,status){


db.ref("reservations/"+id)

.update({

status:status

});


};






/* DELETE */


window.removeItem=function(id){


if(confirm("Reservatie verwijderen?")){


db.ref("reservations/"+id).remove();


}


};



</script>



<script src="header.js"></script>



</body>

</html>
