<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personeel beheer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#c71f1f;
  color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:16px;
}

.searchbar{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#c71f1f;
  color:#fff;
  font-weight:bold;
}

.card{
  background:#fff;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.roles{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.actions button{
  margin-left:6px;
  background:#333;
}

.actions button.delete{
  background:#a30000;
}
</style>

</head>

<body>

<header>
  <div>👥 Personeel beheer</div>
  <div><button onclick="goBack()">← Terug</button></div>
</header>

<div class="container">

  <div class="searchbar">
    <input id="search" placeholder="Zoek personeelslid..." oninput="render()">
    <button onclick="addUser()">+ Nieuw</button>
  </div>

  <div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  remove,
  set,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let users = {};
let editingId = null;

/* ROLES */
const ROLES = [
  "brandweer",
  "chauffeur",
  "ambulancier",
  "bevelvoerder",
  "officier",
  "duiker",
  "gaspakdrager",
  "stagiair",
  "admin",
  "ploeg"
];

const listEl = document.getElementById("list");
const searchEl = document.getElementById("search");

/* LOAD */
onValue(ref(db,"users"), snap=>{
  users = snap.val() || {};
  render();
});

/* RENDER */
function render(){
  const search = searchEl.value.toLowerCase();
  listEl.innerHTML = "";

  Object.keys(users)
    .filter(id =>
      (users[id].displayName || "").toLowerCase().includes(search)
    )
    .sort((a,b)=>
      (users[a].displayName || "").localeCompare(users[b].displayName || "")
    )
    .forEach(id => {

      const u = users[id];

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div>
          <strong>${u.displayName}</strong>
          <div class="roles">
            ${formatRoles(u.roles)}
          </div>
        </div>

        <div class="actions">
          <button onclick="openEdit('${id}')">✏️</button>
          <button class="delete" onclick="openDelete('${id}')">🗑</button>
        </div>
      `;

      listEl.appendChild(div);
    });
}

/* FORMAT */
function formatRoles(r){
  if(!r) return "Geen rollen";
  return Object.keys(r).filter(k=>r[k]).join(" • ");
}

/* OPEN ADD */
window.addUser = function(){
  editingId = null;
  openModal("Nieuw personeelslid", {});
};

/* OPEN EDIT */
window.openEdit = function(id){
  editingId = id;
  openModal("Bewerken", users[id]);
};

/* MODAL SYSTEM */
function openModal(title, data){

  closeModal();

  const modal = document.createElement("div");
  modal.id = "modal";
  modal.style = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
  `;

  modal.innerHTML = `
    <div style="
      background:#fff;
      width:380px;
      border-radius:14px;
      padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3)
    ">

      <h2 style="margin-top:0">${title}</h2>

      <input id="name" placeholder="Naam"
        style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px">

      <div id="rolesBox"></div>

      <div style="margin-top:15px;display:flex;gap:10px">
        <button id="saveBtn" style="flex:1;background:#c71f1f;color:#fff;padding:10px;border:none;border-radius:8px">
          Opslaan
        </button>

        <button onclick="closeModal()" style="flex:1;background:#333;color:#fff;padding:10px;border:none;border-radius:8px">
          Annuleer
        </button>
      </div>

    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById("name").value = data.displayName || "";

  const box = document.getElementById("rolesBox");
  box.innerHTML = "";

  ROLES.forEach(r=>{
    const checked = data.roles?.[r] || false;

    box.innerHTML += `
      <label style="display:block;margin:4px 0">
        <input type="checkbox" value="${r}" ${checked ? "checked":""}>
        ${r}
      </label>
    `;
  });

  document.getElementById("saveBtn").onclick = async () => {

    const name = document.getElementById("name").value;

    const roles = {};
    document.querySelectorAll("#rolesBox input:checked")
      .forEach(i=>roles[i.value]=true);

    const payload = {
      displayName: name,
      permanentieCount: data.permanentieCount || 0,
      roles: roles
    };

    if(editingId){
      await update(ref(db,"users/"+editingId), payload);
    } else {
      const id = name.toLowerCase().replace(/\s/g,"_");
      await set(ref(db,"users/"+id), payload);
    }

    closeModal();
  };

  modal.onclick = (e)=>{
    if(e.target === modal) closeModal();
  };
}

/* CLOSE MODAL */
window.closeModal = function(){
  const m = document.getElementById("modal");
  if(m) m.remove();
}

/* DELETE CONFIRM */
window.openDelete = function(id){

  closeModal();

  const u = users[id];

  const modal = document.createElement("div");
  modal.id = "modal";
  modal.style = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
  `;

  modal.innerHTML = `
    <div style="background:#fff;padding:20px;border-radius:12px;width:300px;text-align:center">
      <h3>Verwijderen?</h3>
      <p>${u.displayName}</p>

      <button id="del" style="background:#a30000;color:#fff;padding:10px;border:none;border-radius:8px;width:100%">
        Verwijderen
      </button>

      <button onclick="closeModal()" style="margin-top:10px;width:100%;padding:10px;border:none;border-radius:8px;background:#333;color:#fff">
        Annuleer
      </button>
    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById("del").onclick = async ()=>{
    await remove(ref(db,"users/"+id));
    closeModal();
  };

  modal.onclick = (e)=>{
    if(e.target === modal) closeModal();
  };
}

/* BACK */
window.goBack = function(){
  window.location.href = "admin.html";
}
</script>

</body>
</html>
