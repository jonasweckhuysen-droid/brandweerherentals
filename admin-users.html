<!doctype html>
<html lang="nl">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Personeel beheer</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>

<style>

.container{
  max-width:1000px;
  margin:auto;
  padding:15px;
}


input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}


.card{
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}


.roles{
  font-size:12px;
  color:#666;
  margin-top:4px;
}


button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#c71f1f;
  color:white;
  font-weight:bold;
  cursor:pointer;
}


.action-btn{
  display:flex;
  gap:5px;
}


.action-btn button{
  padding:8px 10px;
}


.modal{

  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);

  display:none;
  justify-content:center;
  align-items:flex-end;

  z-index:9999;
}



.box{

  background:white;

  width:100%;
  max-width:520px;

  max-height:92vh;

  border-radius:16px 16px 0 0;

  padding:16px;

  display:flex;
  flex-direction:column;

  gap:12px;

}



.box h3{

  margin:0;
  text-align:center;

}



#roles{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:8px;

  overflow:auto;

  padding:10px;

  background:#fafafa;

  border-radius:10px;

}



.role-item{

  background:white;

  border:1px solid #ddd;

  border-radius:8px;

  padding:8px;

  display:flex;

  gap:8px;

  align-items:center;

}



.modal-actions{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:10px;

}


.modal-actions button:last-child{

  background:#555;

}


</style>

</head>


<body>


<header id="appHeader">

  <div class="header-left">

    <img src="logo.png" class="header-logo">

  </div>


  <div class="header-right">

    <div id="greeting"></div>

    <div id="datetime"></div>

    <div id="ploegOfWeek"></div>

  </div>

</header>



<main class="content">


<a href="index.html" class="backlink">

← Terug

</a>



<h2>👥 Beheer personeel</h2>



<div class="container">


<input 
id="search"
placeholder="Zoek persoon..."
oninput="render()">



<button onclick="openModal()">

➕ Nieuw personeel

</button>



<br><br>


<div id="list"></div>


</div>



</main>



<!-- MODAL -->

<div class="modal" id="modal">


<div class="box">


<h3 id="title">

Personeel

</h3>


<input id="name" placeholder="Naam">


<div id="roles"></div>


<div class="modal-actions">

<button onclick="save()">

Opslaan

</button>


<button onclick="closeModal()">

Annuleren

</button>

</div>


</div>


</div>





<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";


import {

getDatabase,

ref,

onValue,

set,

remove

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";




const app = initializeApp({

databaseURL:
"https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"

});



const db = getDatabase(app);



let users={};

let editId=null;



const ROLES=[

"brandweer",

"bevelvoerder",

"officier",

"chauffeur",

"ambulancier",

"duiker",

"gaspakdrager",

"A1",

"A2",

"B1",

"B2",

"C1",

"C2",

"admin"

];



const modal=document.getElementById("modal");

const rolesDiv=document.getElementById("roles");





onValue(ref(db,"users"),snap=>{

users=snap.val()||{};

render();

});





function render(){


const search=

document.getElementById("search")
.value
.toLowerCase();



const list=document.getElementById("list");


list.innerHTML="";



Object.keys(users)

.filter(id=>

(users[id].displayName||"")
.toLowerCase()
.includes(search)

)

.sort((a,b)=>

users[a].displayName
.localeCompare(
users[b].displayName,
"nl"

)

)


.forEach(id=>{


const u=users[id];


const roles=

u.roles ?

Object.keys(u.roles).join(", ")

:

"";



list.innerHTML+=`

<div class="card">

<div>

<b>${u.displayName}</b>

<div class="roles">

${roles}

</div>

</div>



<div class="action-btn">

<button onclick="edit('${id}')">

✏️

</button>


<button onclick="del('${id}')">

🗑

</button>


</div>


</div>

`;


});


}






window.openModal=function(data={}){


editId=data.id||null;


document.getElementById("name").value=
data.displayName||"";


rolesDiv.innerHTML="";



ROLES.forEach(r=>{


rolesDiv.innerHTML+=`

<label class="role-item">


<input 
type="checkbox"
value="${r}"
${data.roles?.[r]?"checked":""}
>


${r}


</label>


`;


});


modal.style.display="flex";


};





window.closeModal=function(){

modal.style.display="none";

};





window.edit=function(id){


let u=users[id];

u.id=id;


openModal(u);


};





window.save=async function(){


const name=

document.getElementById("name")
.value
.trim();


if(!name)return;



const roles={};



document
.querySelectorAll(".role-item input:checked")
.forEach(i=>{

roles[i.value]=true;

});



const id=

editId ||

name
.toLowerCase()
.replace(/\s/g,"_");



await set(

ref(db,"users/"+id),

{

displayName:name,

roles:roles,

permanentieCount:
users[id]?.permanentieCount || 0

}

);



closeModal();


};





window.del=async function(id){


if(confirm("Persoon verwijderen?")){

await remove(
ref(db,"users/"+id)
);

}


};





</script>


<script src="header.js"></script>


</body>

</html>
