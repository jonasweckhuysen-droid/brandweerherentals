<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personeel beheer</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#c71f1f;color:#fff;padding:12px}
.container{max-width:900px;margin:auto;padding:15px}

.card{
  background:#fff;padding:12px;margin-bottom:10px;
  border-radius:10px;display:flex;justify-content:space-between
}

button{padding:8px;border:none;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<header>👥 Personeel beheer</header>

<div class="container">

<input id="search" placeholder="Zoek..." oninput="render()" style="width:100%;padding:10px;margin-bottom:10px">

<button onclick="openForm()">+ Nieuw</button>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase, ref, onValue, set, remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);

let users = {};
let editingId = null;

const rolesList = ["brandweer","chauffeur","ambulancier","duiker","admin"];

onValue(ref(db,"users"), snap=>{
  users = snap.val() || {};
  render();
});

function render(){
  const search = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = "";

  Object.keys(users)
    .filter(id => users[id].displayName.toLowerCase().includes(search))
    .forEach(id=>{

      const u = users[id];

      const roles = u.roles ? Object.keys(u.roles).join(", ") : "";

      list.innerHTML += `
        <div class="card">
          <div>
            <b>${u.displayName}</b><br>
            <small>${roles}</small>
          </div>

          <div>
            <button onclick="edit('${id}')">✏️</button>
            <button onclick="del('${id}')">🗑</button>
          </div>
        </div>
      `;
    });
}

/* DELETE */
window.del = async function(id){
  if(confirm("Verwijderen?")){
    await remove(ref(db,"users/"+id));
  }
}

/* EDIT */
window.edit = function(id){
  editingId = id;
  openForm(users[id]);
}

/* ADD */
window.openForm = function(data={}){

  const name = prompt("Naam", data.displayName || "");
  if(!name) return;

  const roleInput = prompt("Rollen (komma gescheiden)", 
    data.roles ? Object.keys(data.roles).join(",") : ""
  );

  const roles = {};
  roleInput.split(",").forEach(r=>{
    if(r.trim()) roles[r.trim()] = true;
  });

  const id = name.toLowerCase().replace(/\s/g,"_");

  set(ref(db,"users/"+id),{
    displayName:name,
    permanentieCount:data.permanentieCount || 0,
    roles:roles
  });

  editingId = null;
}

</script>

</body>
</html>
