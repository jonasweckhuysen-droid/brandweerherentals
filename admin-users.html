<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personeel beheer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#c71f1f;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:15px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.card{
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.roles{
  font-size:12px;
  color:#666;
}

button{
  padding:6px 10px;
  margin-left:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:flex-end;
}

.box{
  background:#fff;
  width:100%;
  max-width:520px;
  max-height:92vh;
  border-radius:16px 16px 0 0;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  overflow:hidden;
}

/* TITEL */
.box h3{
  margin:0;
  text-align:center;
  font-size:18px;
}

/* INPUTS */
.box input{
  width:100%;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

/* ROLES GRID */
#roles{
  flex:1;
  overflow-y:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  padding:10px;
  border:1px solid #eee;
  border-radius:10px;
  background:#fafafa;
}

/* ROLE ITEM STRAK */
.role-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px;
  background:#fff;
  border:1px solid #eee;
  border-radius:8px;
  font-size:14px;
}

/* BUTTONS FIXED AREA */
.modal-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.modal-actions button{
  padding:12px;
  font-size:15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.modal-actions button:first-child{
  background:#c71f1f;
  color:#fff;
}

.modal-actions button:last-child{
  background:#ddd;
}
</style>
</head>

<body>

<header>
  <div>👥 Personeel</div>
  <button onclick="back()">⬅ Back</button>
</header>

<div class="container">

<input id="search" placeholder="Zoek persoon..." oninput="render()">

<button onclick="openModal()">+ Nieuw</button>

<div id="list"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">

<h3 id="title">Personeel</h3>

<input id="name" placeholder="Naam">

<div id="roles"></div>

<div class="modal-actions">
  <button onclick="save()">Opslaan</button>
  <button onclick="closeModal()">Annuleer</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  set,
  remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);

let users = {};
let editId = null;

const ROLES = [
  "brandweer",
  "bevelvoerder",
  "officier",
  "chauffeur",
  "ambulancier",
  "duiker",
  "gaspakdrager",
  "A1",
  "A2",
  "B1",
  "B2",
  "C1",
  "C2",
  "admin"
];

const modal = document.getElementById("modal");
const rolesDiv = document.getElementById("roles");

onValue(ref(db,"users"), snap=>{
  users = snap.val() || {};
  render();
});

function render(){

  const s = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");

  list.innerHTML = "";

  Object.keys(users)
    .filter(id =>
      users[id].displayName.toLowerCase().includes(s)
    )
    .sort((a,b)=>
      users[a].displayName.localeCompare(users[b].displayName,"nl")
    )
    .forEach(id=>{

      const u = users[id];
      const roles = u.roles ? Object.keys(u.roles).join(", ") : "";

      list.innerHTML += `
        <div class="card">
          <div>
            <b>${u.displayName}</b><br>
            <div class="roles">${roles}</div>
          </div>

          <div>
            <button onclick="edit('${id}')">✏️</button>
            <button onclick="del('${id}')">🗑</button>
          </div>
        </div>
      `;
    });
}

/* OPEN */
window.openModal = function(data={}){

  editId = data.id || null;

  document.getElementById("name").value = data.displayName || "";

  rolesDiv.innerHTML = "";

  ROLES.forEach(r=>{
    const checked = data.roles?.[r];

    rolesDiv.innerHTML += `
      <label class="role-item">
        <input type="checkbox" value="${r}" ${checked?"checked":""}>
        ${r}
      </label>
    `;
  });

  modal.style.display = "flex";
};

/* CLOSE */
window.closeModal = function(){
  modal.style.display = "none";
};

/* EDIT */
window.edit = function(id){
  const u = users[id];
  u.id = id;
  openModal(u);
};

/* SAVE */
window.save = async function(){

  const name = document.getElementById("name").value;
  if(!name) return;

  const roles = {};
  document.querySelectorAll(".role-item input:checked")
    .forEach(i=>roles[i.value]=true);

  const id = editId || name.toLowerCase().replace(/\s/g,"_");

  await set(ref(db,"users/"+id),{
    displayName:name,
    roles:roles,
    permanentieCount:users[id]?.permanentieCount || 0
  });

  closeModal();
};

/* DELETE */
window.del = async function(id){
  if(confirm("Verwijderen?")){
    await remove(ref(db,"users/"+id));
  }
};

/* BACK */
window.back = function(){
  window.location.href = "admin.html";
};

</script>

</body>
</html>
