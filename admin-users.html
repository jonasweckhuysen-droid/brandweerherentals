<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personeel beheer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#c71f1f;
  color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:16px;
}

.searchbar{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#c71f1f;
  color:#fff;
  font-weight:bold;
}

.card{
  background:#fff;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.roles{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.actions button{
  margin-left:6px;
  background:#333;
}

.actions button.delete{
  background:#a30000;
}
</style>

</head>

<body>

<header>
  <div>👥 Personeel beheer</div>
  <div><button onclick="goBack()">← Terug</button></div>
</header>

<div class="container">

  <div class="searchbar">
    <input id="search" placeholder="Zoek personeelslid..." oninput="render()">
    <button onclick="addUser()">+ Nieuw</button>
  </div>
<div id="stats" style="margin-bottom:15px;font-weight:bold"></div>

<div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">

  <select id="roleFilter" onchange="render()" style="padding:10px;border-radius:8px">
    <option value="">Alle rollen</option>
  </select>

  <button onclick="selectAll()">Selecteer alles</button>
  <button onclick="deselectAll()">Deselecteer</button>

  <select id="bulkRole" style="padding:10px;border-radius:8px">
    <option value="">+ rol toevoegen</option>
  </select>

  <button onclick="applyBulkRole()">Toepassen</button>

</div>

  <div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  remove,
  set,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let users = {};
let selected = new Set();
let editingId = null;

/* ROLES */
const ROLES = [
  "brandweer",
  "chauffeur",
  "ambulancier",
  "bevelvoerder",
  "officier",
  "duiker",
  "gaspakdrager",
  "stagiair",
  "admin",
  "ploeg"
];

/* ELEMENTS */
const listEl = document.getElementById("list");
const searchEl = document.getElementById("search");
const statsEl = document.getElementById("stats");
const roleFilterEl = document.getElementById("roleFilter");
const bulkRoleEl = document.getElementById("bulkRole");

/* INIT FILTER DROPDOWNS */
ROLES.forEach(r=>{
  roleFilterEl.innerHTML += `<option value="${r}">${r}</option>`;
  bulkRoleEl.innerHTML += `<option value="${r}">${r}</option>`;
});

/* LIVE DATA */
onValue(ref(db,"users"), snap=>{
  users = snap.val() || {};
  render();
});

/* STATS */
function updateStats(){
  const total = Object.keys(users).length;

  const countRole = (role)=>{
    return Object.values(users).filter(u => u.roles?.[role]).length;
  };

  statsEl.innerHTML = `
    👥 Totaal: ${total}
    | 🚒 Brandweer: ${countRole("brandweer")}
    | 🚗 Chauffeur: ${countRole("chauffeur")}
    | 🤿 Duiker: ${countRole("duiker")}
    | 🛠 Admin: ${countRole("admin")}
  `;
}

/* RENDER */
function render(){

  updateStats();

  const search = searchEl.value.toLowerCase();
  const filterRole = roleFilterEl.value;

  listEl.innerHTML = "";

  Object.keys(users)
    .filter(id=>{
      const u = users[id];

      const matchSearch = (u.displayName||"").toLowerCase().includes(search);
      const matchRole = !filterRole || u.roles?.[filterRole];

      return matchSearch && matchRole;
    })
    .sort((a,b)=>
      (users[a].displayName||"").localeCompare(users[b].displayName||"")
    )
    .forEach(id=>{

      const u = users[id];

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px">

          <input type="checkbox"
            onchange="toggleSelect('${id}')"
            ${selected.has(id) ? "checked":""}>

          <div>
            <strong>${u.displayName}</strong>
            <div class="roles">${formatRoles(u.roles)}</div>
          </div>
        </div>

        <div class="actions">
          <button onclick="openEdit('${id}')">✏️</button>
          <button class="delete" onclick="openDelete('${id}')">🗑</button>
        </div>
      `;

      listEl.appendChild(div);
    });
}

/* FORMAT ROLES */
function formatRoles(r){
  if(!r) return "Geen rollen";
  return Object.keys(r).filter(k=>r[k]).join(" • ");
}

/* SELECT */
window.toggleSelect = function(id){
  if(selected.has(id)) selected.delete(id);
  else selected.add(id);
  render();
};

window.selectAll = function(){
  Object.keys(users).forEach(id=>selected.add(id));
  render();
};

window.deselectAll = function(){
  selected.clear();
  render();
};

/* BULK ROLE */
window.applyBulkRole = async function(){

  const role = bulkRoleEl.value;
  if(!role) return;

  const updates = {};

  selected.forEach(id=>{
    updates["users/"+id+"/roles/"+role] = true;
  });

  await update(ref(db), updates);

  selected.clear();
};

/* DELETE */
window.openDelete = function(id){

  const u = users[id];

  const modal = document.createElement("div");
  modal.style = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
  `;

  modal.innerHTML = `
    <div style="background:#fff;padding:20px;border-radius:12px;width:300px;text-align:center">
      <h3>Verwijderen?</h3>
      <p>${u.displayName}</p>

      <button id="del" style="background:#a30000;color:#fff;padding:10px;border:none;border-radius:8px;width:100%">
        Verwijderen
      </button>

      <button onclick="this.parentElement.parentElement.remove()" style="margin-top:10px;width:100%;padding:10px;border:none;border-radius:8px;background:#333;color:#fff">
        Annuleer
      </button>
    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById("del").onclick = async ()=>{
    await remove(ref(db,"users/"+id));
    modal.remove();
  };
}

/* PLACEHOLDERS (blijven uit stap 4) */
window.openEdit = function(id){
  alert("Edit zit al in Stap 4 popup");
};

window.addUser = function(){
  alert("Gebruik popup uit Stap 4");
};

window.goBack = function(){
  window.location.href = "admin.html";
};
</script>

</body>
</html>
