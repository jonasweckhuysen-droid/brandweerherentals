<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personeel beheer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#c71f1f;
  color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:16px;
}

.searchbar{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#c71f1f;
  color:#fff;
  font-weight:bold;
}

.card{
  background:#fff;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.roles{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.actions button{
  margin-left:6px;
  background:#333;
}

.actions button.delete{
  background:#a30000;
}
</style>

</head>

<body>

<header>
  <div>👥 Personeel beheer</div>
  <div><button onclick="goBack()">← Terug</button></div>
</header>

<div class="container">

  <div class="searchbar">
    <input id="search" placeholder="Zoek personeelslid..." oninput="render()">
    <button onclick="addUser()">+ Nieuw</button>
  </div>

  <div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  remove,
  set,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let users = {};
let editingId = null;

/* ROLES */
const ROLES = [
  "brandweer",
  "chauffeur",
  "ambulancier",
  "bevelvoerder",
  "officier",
  "duiker",
  "gaspakdrager",
  "stagiair",
  "admin",
  "ploeg"
];

const listEl = document.getElementById("list");
const searchEl = document.getElementById("search");

/* LIVE DATA */
onValue(ref(db, "users"), (snap) => {
  users = snap.val() || {};
  render();
});

/* RENDER */
function render(){
  const search = searchEl.value.toLowerCase();
  listEl.innerHTML = "";

  Object.keys(users)
    .filter(id =>
      (users[id].displayName || "").toLowerCase().includes(search)
    )
    .sort((a,b)=>
      (users[a].displayName || "").localeCompare(users[b].displayName || "")
    )
    .forEach(id => {

      const u = users[id];
      const roles = formatRoles(u.roles);

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div>
          <strong>${u.displayName}</strong>
          <div class="roles">${roles}</div>
        </div>

        <div class="actions">
          <button onclick="openEdit('${id}')">✏️</button>
          <button class="delete" onclick="deleteUser('${id}')">🗑</button>
        </div>
      `;

      listEl.appendChild(div);
    });
}

/* FORMAT ROLES */
function formatRoles(r){
  if(!r) return "Geen rollen";

  if(Array.isArray(r)){
    return r.join(" • ");
  }

  if(typeof r === "object"){
    return Object.keys(r).filter(k => r[k]).join(" • ");
  }

  return "Geen rollen";
}

/* DELETE */
window.deleteUser = async function(id){
  if(!confirm("Verwijderen?")) return;
  await remove(ref(db, "users/" + id));
};

/* OPEN ADD */
window.addUser = function(){
  editingId = null;
  openPopup({
    displayName:"",
    roles:{},
    permanentieCount:0
  });
};

/* OPEN EDIT */
window.openEdit = function(id){
  editingId = id;
  openPopup(users[id]);
};

/* POPUP */
function openPopup(data){

  let popup = document.getElementById("popup");

  if(!popup){
    popup = document.createElement("div");
    popup.id = "popup";
    popup.style = `
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.6);
      display:flex;
      align-items:center;
      justify-content:center;
    `;

    popup.innerHTML = `
      <div style="background:#fff;padding:20px;border-radius:12px;width:350px">
        <h3>Personeel</h3>

        <input id="name" placeholder="Naam" style="width:100%;padding:10px;margin-bottom:10px">

        <div id="rolesBox"></div>

        <br>

        <button id="saveBtn" style="width:100%">Opslaan</button>
      </div>
    `;

    document.body.appendChild(popup);

    popup.onclick = (e) => {
      if(e.target === popup) popup.remove();
    };
  }

  document.getElementById("name").value = data.displayName || "";

  const box = document.getElementById("rolesBox");
  box.innerHTML = "";

  ROLES.forEach(r => {
    const checked = data.roles && (
      Array.isArray(data.roles)
        ? data.roles.includes(r)
        : data.roles[r]
    );

    box.innerHTML += `
      <label style="display:block">
        <input type="checkbox" value="${r}" ${checked ? "checked":""}>
        ${r}
      </label>
    `;
  });

  document.getElementById("saveBtn").onclick = async () => {

    const name = document.getElementById("name").value;

    const checkedRoles = {};
    document.querySelectorAll("#rolesBox input:checked")
      .forEach(i => checkedRoles[i.value] = true);

    const payload = {
      displayName: name,
      permanentieCount: data.permanentieCount || 0,
      roles: checkedRoles
    };

    if(editingId){
      await update(ref(db, "users/" + editingId), payload);
    } else {
      const newId = name.toLowerCase().replace(/\s/g,"_");
      await set(ref(db, "users/" + newId), payload);
    }

    popup.remove();
  };
}

/* BACK */
window.goBack = function(){
  window.location.href = "admin.html";
}
</script>

</body>
</html>
