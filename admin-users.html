<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personeel beheer</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#c71f1f;color:#fff;padding:12px}
.container{max-width:900px;margin:auto;padding:15px}

input{
  width:100%;padding:10px;margin:10px 0;
}

.card{
  background:#fff;padding:12px;margin-bottom:10px;
  border-radius:10px;display:flex;justify-content:space-between;
  align-items:center;
}

button{
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-left:5px;
}

#modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#fff;
  padding:15px;
  border-radius:12px;
  width:300px;
}

.role-list label{
  display:block;
  margin:4px 0;
}
</style>
</head>

<body>

<header>👥 Personeel beheer</header>

<div class="container">

<input id="search" placeholder="Zoek..." oninput="render()">

<button onclick="openModal()">+ Nieuw</button>

<div id="list"></div>

</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">

    <h3 id="title">Personeel</h3>

    <input id="name" placeholder="Naam">

    <div class="role-list" id="roles"></div>

    <br>

    <button onclick="save()">Opslaan</button>
    <button onclick="closeModal()">Annuleer</button>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase, ref, onValue, set, remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://post-herentals-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);

let users = {};
let editId = null;

const ROLES = [
  "brandweer",
  "chauffeur",
  "ambulancier",
  "duiker",
  "admin"
];

const modal = document.getElementById("modal");
const rolesDiv = document.getElementById("roles");

onValue(ref(db,"users"), snap=>{
  users = snap.val() || {};
  render();
});

function render(){

  const s = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = "";

  let filtered = Object.keys(users)
    .filter(id => users[id].displayName.toLowerCase().includes(s))
    .sort((a,b)=>
      users[a].displayName.localeCompare(users[b].displayName,"nl")
    );

  if(filtered.length === 0){
    list.innerHTML = `
      <div style="padding:15px;text-align:center;color:#666">
        Geen resultaten gevonden
      </div>
    `;
    return;
  }

  filtered.forEach(id=>{

    const u = users[id];

    const roles = u.roles
      ? Object.keys(u.roles)
      : [];

    const badges = roles.map(r=>`
      <span style="
        display:inline-block;
        padding:2px 8px;
        margin:2px;
        border-radius:10px;
        font-size:12px;
        background:${roleColor(r)};
        color:white;
      ">${r}</span>
    `).join("");

    list.innerHTML += `
      <div class="card">
        <div>
          <b>${u.displayName}</b><br>
          <div>${badges}</div>
        </div>

        <div>
          <button onclick="edit('${id}')">✏️</button>
          <button onclick="del('${id}')">🗑</button>
        </div>
      </div>
    `;
  });
}

/* OPEN ADD */
window.openModal = function(data={}){

  editId = data.id || null;

  document.getElementById("name").value = data.displayName || "";

  rolesDiv.innerHTML = "";

  ROLES.forEach(r=>{
    const checked = data.roles?.[r];

    rolesDiv.innerHTML += `
      <label>
        <input type="checkbox" value="${r}" ${checked?"checked":""}>
        ${r}
      </label>
    `;
  });

  modal.style.display = "flex";
}

/* CLOSE */
window.closeModal = function(){
  modal.style.display = "none";
}

/* EDIT */
window.edit = function(id){
  const u = users[id];
  u.id = id;
  openModal(u);
}

/* SAVE */
window.save = async function(){

  const name = document.getElementById("name").value;
  if(!name) return;

  const roles = {};
  document.querySelectorAll(".role-list input:checked")
    .forEach(i=>roles[i.value]=true);

  const id = editId || name.toLowerCase().replace(/\s/g,"_");

  await set(ref(db,"users/"+id),{
    displayName:name,
    permanentieCount:users[id]?.permanentieCount || 0,
    roles:roles
  });

  closeModal();
}

/* DELETE */
window.del = async function(id){
  if(confirm("Verwijderen?")){
    await remove(ref(db,"users/"+id));
  }
}
  function roleColor(role){

  switch(role){
    case "admin": return "#c71f1f";
    case "chauffeur": return "#1f6fc7";
    case "brandweer": return "#2e7d32";
    case "ambulancier": return "#6a1b9a";
    case "duiker": return "#ef6c00";
    default: return "#555";
  }
}

</script>

</body>
</html>
